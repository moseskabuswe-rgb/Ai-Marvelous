<!DOCTYPE html>
<html lang="bem">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AI Marvelous</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --earth: #c17f3a;
  --deep:  #0b0700;
  --gold:  #ffd166;
  --green: #2d6a4f;
  --red:   #e63946;
  --blue:  #4a9eff;
  --panel: rgba(255,255,255,0.03);
  --bdr:   rgba(193,127,58,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--deep);
  min-height: 100vh;
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 220px;
  background-image:
    radial-gradient(ellipse at 10% 0%,   rgba(193,127,58,0.11) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(45,106,79,0.08)  0%, transparent 50%);
}

/* ── HEADER ── */
.hdr {
  width:100%; max-width:480px;
  padding: 42px 20px 16px;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.brand { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.9rem; line-height:1; }
.brand-sub { color:rgba(255,255,255,0.18); font-size:0.54rem; letter-spacing:3px; text-transform:uppercase; margin-top:5px; }
.live-badge {
  display:flex; align-items:center; gap:7px;
  background:rgba(230,57,70,0.1); border:1px solid rgba(230,57,70,0.2);
  border-radius:20px; padding:6px 13px;
  font-size:0.65rem; color:rgba(230,57,70,0.8);
  letter-spacing:1px; text-transform:uppercase;
  margin-top:6px;
}
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--red); box-shadow:0 0 6px var(--red);
  animation: livepulse 1.5s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── ROAD TO FLUENCY ── */
.road-wrap {
  width:100%; max-width:480px;
  padding: 0 20px 20px;
}
.road-title {
  color:rgba(255,255,255,0.35); font-size:0.58rem;
  letter-spacing:3px; text-transform:uppercase;
  margin-bottom:14px; display:flex; justify-content:space-between; align-items:center;
}
.road-title span { color:var(--earth); font-size:0.68rem; letter-spacing:1px; }

/* The road itself */
.road {
  position:relative;
  width:100%;
  padding: 8px 0 24px;
}

/* Road track */
.road-track {
  position:relative;
  height:6px;
  background:rgba(255,255,255,0.06);
  border-radius:6px;
  overflow:visible;
  margin: 0 14px;
}
.road-fill {
  height:100%; border-radius:6px;
  background:linear-gradient(90deg, #2d6a4f, #c17f3a, #ffd166);
  transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
  width:0%;
  position:relative;
}
/* Traveller dot on the road */
.traveller {
  position:absolute;
  top:50%; transform:translate(-50%,-50%);
  width:18px; height:18px;
  border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 0 3px rgba(255,209,102,0.25), 0 0 16px rgba(255,209,102,0.4);
  transition: left 0.8s cubic-bezier(0.34,1.56,0.64,1);
  left:0%;
  z-index:2;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem;
}

/* Milestone markers on the road */
.milestones {
  display:flex; justify-content:space-between;
  padding: 10px 14px 0;
  position:relative;
}
.milestone {
  display:flex; flex-direction:column; align-items:center;
  gap:5px; flex:1; position:relative;
}
.milestone:first-child { align-items:flex-start; }
.milestone:last-child  { align-items:flex-end; }

.m-dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.1);
  transition:all 0.5s;
}
.m-dot.reached {
  background:var(--earth);
  border-color:var(--earth);
  box-shadow:0 0 8px rgba(193,127,58,0.5);
}
.m-dot.current {
  background:var(--gold);
  border-color:var(--gold);
  box-shadow:0 0 10px rgba(255,209,102,0.6);
  animation:mglw 2s ease-in-out infinite;
}
@keyframes mglw { 0%,100%{box-shadow:0 0 8px rgba(255,209,102,0.5)} 50%{box-shadow:0 0 18px rgba(255,209,102,0.9)} }

.m-label {
  font-size:0.52rem; color:rgba(255,255,255,0.2);
  text-align:center; letter-spacing:0.5px;
  line-height:1.3; white-space:nowrap;
  transition:color 0.5s;
}
.m-label.reached { color:var(--earth); }
.m-label.current { color:var(--gold); font-weight:600; }

.m-icon { font-size:0.9rem; }

/* ── STATUS BAR ── */
.status-bar {
  width:100%; max-width:480px; padding:0 20px;
  display:flex; align-items:center; justify-content:center;
  gap:10px; margin-bottom:18px;
}
.status-pill {
  background:var(--panel); border:1px solid var(--bdr);
  border-radius:20px; padding:7px 16px;
  font-size:0.72rem; color:rgba(255,255,255,0.35);
  display:flex; align-items:center; gap:7px;
  transition:all 0.4s;
}
.status-pill.active { border-color:rgba(230,57,70,0.35); color:rgba(230,57,70,0.8); background:rgba(230,57,70,0.07); }
.status-pill.speaking { border-color:rgba(45,106,79,0.35); color:rgba(45,106,79,0.9); background:rgba(45,106,79,0.08); }
.status-pill.thinking { border-color:rgba(255,209,102,0.3); color:rgba(255,209,102,0.7); background:rgba(255,209,102,0.06); }
.spill-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.spill-dot.pulse { animation:livepulse 1s ease-in-out infinite; }

/* ── CHAT ── */
.chat {
  width:100%; max-width:480px; padding:0 14px;
  display:flex; flex-direction:column; gap:11px;
  margin-bottom:10px;
}

.bbl {
  max-width:88%; padding:13px 16px;
  font-size:0.96rem; line-height:1.7;
  animation:fu 0.3s ease;
}
@keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.bbl.ai {
  background:rgba(193,127,58,0.08); border:1px solid rgba(193,127,58,0.18);
  border-radius:17px 17px 17px 3px; align-self:flex-start;
}
.bbl.ai.q { border-left:3px solid var(--blue); background:rgba(74,158,255,0.07); }
.bbl.ai.win { border-left:3px solid var(--green); background:rgba(45,106,79,0.09); }
.bbl.user {
  background:rgba(45,106,79,0.11); border:1px solid rgba(45,106,79,0.2);
  border-radius:17px 17px 3px 17px; align-self:flex-end; text-align:right;
}
.bbl-tag {
  font-size:0.56rem; letter-spacing:2px; text-transform:uppercase;
  margin-bottom:6px; opacity:0.6;
}
.bbl-tag.q { color:var(--blue); }
.bbl-tag.win { color:#4caf50; }

/* THINKING */
.thinking {
  display:none; align-self:flex-start;
  padding:13px 17px;
  background:rgba(193,127,58,0.06); border:1px solid rgba(193,127,58,0.12);
  border-radius:17px 17px 17px 3px; gap:5px; align-items:center;
}
.thinking.show { display:flex; }
.td { width:7px; height:7px; border-radius:50%; background:var(--earth); opacity:0.35; animation:td 1s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.13s} .td:nth-child(3){animation-delay:.26s}
@keyframes td { 0%,100%{transform:translateY(0);opacity:0.25} 50%{transform:translateY(-6px);opacity:0.9} }

/* ── BOTTOM LIVE PANEL ── */
.bottom-panel {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; flex-direction:column; align-items:center;
  padding:16px 20px 36px;
  background:linear-gradient(to top, rgba(11,7,0,1) 65%, rgba(11,7,0,0));
  gap:12px;
}

/* Big live conversation button */
.conv-btn {
  width:100%; max-width:420px;
  height:64px; border-radius:32px; border:none; outline:none;
  cursor:pointer; touch-action:manipulation;
  display:flex; align-items:center; justify-content:center; gap:12px;
  font-family:inherit; font-size:0.88rem; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; transition:all 0.3s;
  -webkit-appearance:none;
}
.conv-btn.idle {
  background:radial-gradient(ellipse at 35% 40%, #c17f3a, #4a2508);
  box-shadow:0 0 40px rgba(193,127,58,0.2), 0 8px 30px rgba(0,0,0,0.7);
  color:white;
}
.conv-btn.listening {
  background:radial-gradient(ellipse at 35% 40%, #e63946, #6a0010);
  box-shadow:0 0 40px rgba(230,57,70,0.3), 0 8px 30px rgba(0,0,0,0.7);
  color:white; animation:pr 1.4s ease-out infinite;
}
.conv-btn.speaking {
  background:radial-gradient(ellipse at 35% 40%, #2d6a4f, #0a2018);
  box-shadow:0 0 40px rgba(45,106,79,0.25), 0 8px 30px rgba(0,0,0,0.7);
  color:white; animation:pg 1.4s ease-out infinite;
}
.conv-btn.thinking {
  background:radial-gradient(ellipse at 35% 40%, #c9a227, #4a3800);
  box-shadow:0 0 30px rgba(201,162,39,0.2), 0 8px 30px rgba(0,0,0,0.7);
  color:rgba(255,255,255,0.7);
}
@keyframes pr { 0%{box-shadow:0 0 0 0 rgba(230,57,70,0.45),0 8px 30px rgba(0,0,0,0.7)} 70%{box-shadow:0 0 0 22px rgba(230,57,70,0),0 8px 30px rgba(0,0,0,0.7)} 100%{box-shadow:0 0 0 0 rgba(230,57,70,0),0 8px 30px rgba(0,0,0,0.7)} }
@keyframes pg { 0%{box-shadow:0 0 0 0 rgba(45,106,79,0.45),0 8px 30px rgba(0,0,0,0.7)} 70%{box-shadow:0 0 0 22px rgba(45,106,79,0),0 8px 30px rgba(0,0,0,0.7)} 100%{box-shadow:0 0 0 0 rgba(45,106,79,0),0 8px 30px rgba(0,0,0,0.7)} }
.conv-btn:active { transform:scale(0.97); }

.conv-btn-icon { font-size:1.4rem; }

/* Waveform inside button when listening */
.wavebars { display:none; align-items:center; gap:3px; height:22px; }
.wavebars.show { display:flex; }
.wbar { width:3px; background:rgba(255,255,255,0.8); border-radius:3px; animation:wb 0.7s ease-in-out infinite; }
.wbar:nth-child(1){animation-delay:0s;height:6px}
.wbar:nth-child(2){animation-delay:0.1s;height:14px}
.wbar:nth-child(3){animation-delay:0.2s;height:20px}
.wbar:nth-child(4){animation-delay:0.1s;height:14px}
.wbar:nth-child(5){animation-delay:0s;height:6px}
@keyframes wb { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }

/* Bottom row - teach button */
.bottom-row { display:flex; gap:10px; width:100%; max-width:420px; }
.teach-btn {
  flex:1; height:46px; border-radius:23px; border:none; outline:none;
  cursor:pointer; touch-action:manipulation;
  background:rgba(193,127,58,0.1); border:1px solid rgba(193,127,58,0.2);
  color:var(--earth); font-family:inherit; font-size:0.75rem;
  letter-spacing:1px; text-transform:uppercase; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.2s;
}
.teach-btn:active { background:rgba(193,127,58,0.18); transform:scale(0.97); }

.new-btn {
  height:46px; width:46px; border-radius:50%; border:none; outline:none;
  cursor:pointer; touch-action:manipulation;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
.new-btn:active { background:rgba(255,255,255,0.1); transform:scale(0.94); }

/* TEACH PANEL */
.teach-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
  z-index:100; align-items:flex-end; justify-content:center;
  padding:0 0 0;
}
.teach-overlay.show { display:flex; }
.teach-sheet {
  width:100%; max-width:480px;
  background:#1a0f00; border:1px solid rgba(193,127,58,0.2);
  border-radius:24px 24px 0 0; padding:24px 20px 48px;
  animation:slideup 0.3s ease;
}
@keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
.teach-sheet-title { color:var(--gold); font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:6px; }
.teach-sheet-sub { color:rgba(255,255,255,0.3); font-size:0.8rem; margin-bottom:18px; line-height:1.5; }
.teach-in {
  width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:14px 16px; color:white; font-size:1rem;
  font-family:inherit; outline:none; margin-bottom:12px;
}
.teach-in:focus { border-color:rgba(193,127,58,0.45); }
.teach-row { display:flex; gap:10px; }
.teach-submit { flex:1; background:var(--earth); border:none; border-radius:12px; color:var(--deep); font-weight:700; padding:14px; cursor:pointer; font-size:0.9rem; font-family:inherit; touch-action:manipulation; }
.teach-cancel-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:rgba(255,255,255,0.35); padding:14px 18px; cursor:pointer; font-family:inherit; touch-action:manipulation; }

/* LEARNED BANK */
.learned-wrap { width:100%; max-width:480px; padding:0 14px; margin-bottom:10px; }
.learned-hdr { color:rgba(255,255,255,0.15); font-size:0.54rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:9px; display:flex; justify-content:space-between; }
.learned-hdr span { color:var(--earth); }
.learned-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.learned-scroll::-webkit-scrollbar { display:none; }
.learned-chip {
  flex-shrink:0; background:rgba(45,106,79,0.08); border:1px solid rgba(45,106,79,0.2);
  border-radius:20px; padding:7px 14px;
  display:flex; align-items:center; gap:7px;
  font-size:0.78rem; color:rgba(255,255,255,0.6); cursor:pointer;
  touch-action:manipulation; white-space:nowrap; transition:all 0.2s;
}
.learned-chip:active { background:rgba(45,106,79,0.16); }
.learned-chip strong { color:var(--gold); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="brand">AI Marvelous</div>
    <div class="brand-sub">Bemba Student AI</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>Live</div>
</div>

<!-- ROAD TO FLUENCY -->
<div class="road-wrap">
  <div class="road-title">
    Road to Fluency
    <span id="roadLabel">Baby Steps</span>
  </div>
  <div class="road">
    <div class="road-track">
      <div class="road-fill" id="roadFill"></div>
      <div class="traveller" id="traveller">🚶</div>
    </div>
    <div class="milestones">
      <div class="milestone">
        <div class="m-icon">🌱</div>
        <div class="m-dot reached" id="m0"></div>
        <div class="m-label reached" id="ml0">Start</div>
      </div>
      <div class="milestone">
        <div class="m-icon">🗣️</div>
        <div class="m-dot" id="m1"></div>
        <div class="m-label" id="ml1">Greetings</div>
      </div>
      <div class="milestone">
        <div class="m-icon">🏘️</div>
        <div class="m-dot" id="m2"></div>
        <div class="m-label" id="ml2">Daily Life</div>
      </div>
      <div class="milestone">
        <div class="m-icon">🌿</div>
        <div class="m-dot" id="m3"></div>
        <div class="m-label" id="ml3">Conversing</div>
      </div>
      <div class="milestone">
        <div class="m-icon">🔥</div>
        <div class="m-dot" id="m4"></div>
        <div class="m-label" id="ml4">Fluent</div>
      </div>
      <div class="milestone">
        <div class="m-icon">🦅</div>
        <div class="m-dot" id="m5"></div>
        <div class="m-label" id="ml5">Expert</div>
      </div>
    </div>
  </div>
</div>

<!-- STATUS -->
<div class="status-bar">
  <div class="status-pill" id="statusPill">
    <div class="spill-dot"></div>
    <span id="statusText">Ready to learn</span>
  </div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>
<div class="thinking" id="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div>

<!-- LEARNED CHIPS -->
<div class="learned-wrap" id="learnedWrap" style="display:none">
  <div class="learned-hdr">Learned <span id="learnedCount">0</span></div>
  <div class="learned-scroll" id="learnedScroll"></div>
</div>

<!-- SPACER -->
<div style="height:180px"></div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel">
  <!-- Big conversation button -->
  <button class="conv-btn idle" id="convBtn" onclick="handleConv()">
    <span class="conv-btn-icon" id="convIcon">🎙️</span>
    <div class="wavebars" id="wavebars">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div>
    </div>
    <span id="convLabel">Start Talking</span>
  </button>

  <!-- Bottom row -->
  <div class="bottom-row">
    <button class="teach-btn" onclick="openTeach()">✏️ Teach a Word or Phrase</button>
    <button class="new-btn" onclick="nextQuestion()" title="New question">🎓</button>
  </div>
</div>

<!-- TEACH OVERLAY -->
<div class="teach-overlay" id="teachOverlay">
  <div class="teach-sheet">
    <div class="teach-sheet-title">Teach Me 🎓</div>
    <div class="teach-sheet-sub" id="teachSheetSub">Type any Bemba word, phrase, or correction — I'll remember it and use it going forward.</div>
    <input class="teach-in" id="teachIn" placeholder="e.g. Natotela — Thank you" />
    <div class="teach-row">
      <button class="teach-submit" onclick="submitTeaching()">Teach Me This ✓</button>
      <button class="teach-cancel-btn" onclick="closeTeach()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ──
const STORE_KEY = 'aim_v3_learned';
function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); } catch { return []; } }
function save(a) { try { localStorage.setItem(STORE_KEY, JSON.stringify(a)); } catch {} }

// ── STATE ──
let st = 'idle'; // idle | listening | thinking | speaking
let rec = null;
let autoListen = false; // live conversation mode
let history = [];
let learned = load();

// Milestones: [threshold in teachings, label]
const MILESTONES = [
  { threshold:0,  label:'Baby Steps',   emoji:'🚶' },
  { threshold:5,  label:'Greetings',    emoji:'👋' },
  { threshold:15, label:'Daily Life',   emoji:'🏘️' },
  { threshold:30, label:'Conversing',   emoji:'🗣️' },
  { threshold:55, label:'Fluent!',      emoji:'🔥' },
  { threshold:80, label:'Expert!',      emoji:'🦅' },
];

// ── SYSTEM PROMPT ──
function buildPrompt() {
  const bank = learned.length
    ? '\n\nWHAT I HAVE LEARNED SO FAR (from real Bemba speakers):\n' +
      learned.slice(0,30).map(l => `• ${l.text}`).join('\n')
    : '';
  return `You are AI Marvelous — an enthusiastic, humble AI student learning Bemba from real speakers in Garneton compound, Lusaka, Zambia.

YOUR ROLE: You are THE STUDENT. The human is your TEACHER. You lead the conversation.

HOW YOU BEHAVE:
- Always speak first. Lead the conversation. Ask questions. Attempt Bemba phrases.
- Keep every response to 2–3 sentences MAX so the conversation flows naturally.
- Mix Bemba and English the way real urban Zambians do — natural, not formal.
- Always end with ONE question — either asking to hear a pronunciation, checking if you said something right, or asking what a word means.
- Regularly ask: "Can you say that for me exactly how someone in Garneton would say it?" 
- When you try a Bemba phrase, add "Nati bwino? — Did I say that right?"
- Celebrate corrections warmly: "Ee, natotela! I will remember that!"
- Be genuinely curious and playful — you WANT to learn.
- This is a LIVE VOICE conversation. Be conversational, not formal. Short sentences.
- Never use bullet points or lists — just natural flowing speech.
${bank}`;
}

// ── BUBBLES ──
function addBubble(role, text, tag='') {
  if (role !== 'sys') history.push({ role: role==='ai'?'assistant':'user', content:text });
  const wrap = document.getElementById('chat');
  const b = document.createElement('div');
  b.className = 'bbl ' + (role==='ai' ? 'ai' + (tag?' '+tag:'') : 'user');

  if (tag && role==='ai') {
    const t = document.createElement('div');
    t.className = 'bbl-tag ' + tag;
    t.textContent = tag==='q' ? '🎓 Asking...' : '✅ Learned!';
    b.appendChild(t);
  }

  const txt = document.createElement('div');
  txt.textContent = text;
  b.appendChild(txt);
  wrap.appendChild(b);
  setTimeout(() => b.scrollIntoView({ behavior:'smooth', block:'end' }), 80);
}

// ── CLAUDE ──
async function claude(userText, tag='q') {
  setSt('thinking');
  document.getElementById('thinking').classList.add('show');

  try {
    const msgs = history.slice(-16);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:300,
        system: buildPrompt(), messages: msgs
      })
    });
    const data = await res.json();
    document.getElementById('thinking').classList.remove('show');
    const reply = data.content?.[0]?.text || 'Mwena — try again.';
    addBubble('ai', reply, tag);
    say(reply);
  } catch {
    document.getElementById('thinking').classList.remove('show');
    addBubble('ai', 'Pakwata internet — lost connection.');
    setSt('idle');
  }
}

// ── SPEECH OUT ──
function say(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const vs = window.speechSynthesis.getVoices();
  const v = vs.find(x=>x.lang.includes('ZA')||x.lang.includes('ZM')||x.lang.includes('KE'))
          || vs.find(x=>x.lang.startsWith('en')) || vs[0];
  if (v) u.voice = v;
  u.rate = 0.86;
  u.onstart = () => setSt('speaking');
  u.onend   = () => {
    setSt('idle');
    // Auto-listen after AI speaks if live mode is on
    if (autoListen) setTimeout(() => startListening(), 400);
  };
  u.onerror = () => setSt('idle');
  setSt('speaking');
  window.speechSynthesis.speak(u);
}

// ── HANDLE MAIN BUTTON ──
function handleConv() {
  if (st === 'speaking') {
    // Interrupt and listen
    window.speechSynthesis.cancel();
    autoListen = true;
    startListening();
    return;
  }
  if (st === 'listening') {
    if (rec) rec.stop();
    autoListen = false;
    setSt('idle');
    return;
  }
  if (st === 'thinking') return;

  // Start live conversation mode
  autoListen = true;
  startListening();
}

// ── MIC ──
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Please use Safari or Chrome.'); return; }

  rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = () => setSt('listening');

  rec.onresult = e => {
    let fin='', tmp='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else tmp += e.results[i][0].transcript;
    }
    if (tmp) setStatus('Heard: ' + tmp, 'active');
    if (fin) {
      rec.stop();
      addBubble('user', fin);
      claude(fin);
    }
  };

  rec.onerror = e => {
    autoListen = false; setSt('idle');
    if (e.error==='not-allowed')
      alert('Microphone blocked.\n\niPhone: Settings → Safari → Microphone → Allow\n\nThen reload.');
    else if (e.error !== 'no-speech') setSt('idle');
  };

  rec.onend = () => { if (st==='listening') setSt('idle'); };
  rec.start();
}

// ── TEACH ──
function openTeach(ctx='') {
  window.speechSynthesis.cancel();
  autoListen = false;
  document.getElementById('teachIn').value = '';
  document.getElementById('teachSheetSub').textContent = ctx
    ? 'Correcting: "' + ctx.slice(0,60) + '"'
    : 'Teach me any Bemba word, phrase, or correction.';
  document.getElementById('teachOverlay').classList.add('show');
  setTimeout(() => document.getElementById('teachIn').focus(), 300);
}
function closeTeach() { document.getElementById('teachOverlay').classList.remove('show'); }

function submitTeaching() {
  const text = document.getElementById('teachIn').value.trim();
  if (!text) return;
  learned.unshift({ id:Date.now(), text });
  save(learned);
  closeTeach();
  updateRoad();
  renderLearnedChips();

  addBubble('user', '✏️ Teaching: "' + text + '"');
  claude(
    `My teacher just taught me: "${text}". React as an excited student who just learned something. Repeat it to confirm. Then ask one follow-up question about pronunciation or how a Zambian would really say it.`,
    'win'
  );
}

// ── NEXT QUESTION ──
function nextQuestion() {
  if (st==='thinking'||st==='listening') return;
  window.speechSynthesis.cancel();
  const prompts = [
    "Try greeting someone in Bemba and ask if the pronunciation is right.",
    "Ask how to say a common daily phrase in Bemba — like 'I am hungry' or 'let's go'.",
    "Attempt to say something about the weather in Bemba, then ask if it sounds natural.",
    "Ask how elders are greeted respectfully in Bemba the Zambian way.",
    "Try to say 'how much does this cost?' in Bemba and ask for correction.",
    "Ask what people say in Garneton when something good happens.",
    "Attempt a sentence about food in Bemba — any sentence — and ask the teacher to correct it.",
    "Ask how to say numbers 1 to 3 in Bemba, and ask to hear the real pronunciation.",
    "Ask what a typical Zambian says when they meet a friend they haven't seen in a while.",
    "Try to say goodbye in Bemba in the most natural Zambian way.",
  ];
  claude(prompts[Math.floor(Math.random()*prompts.length)]);
}

// ── LEARNED CHIPS ──
function renderLearnedChips() {
  const wrap = document.getElementById('learnedWrap');
  const scroll = document.getElementById('learnedScroll');
  const count = document.getElementById('learnedCount');
  if (learned.length===0) { wrap.style.display='none'; return; }
  wrap.style.display='block';
  count.textContent = learned.length;
  scroll.innerHTML = learned.slice(0,12).map(l => `
    <div class="learned-chip" onclick="say('${l.text.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
      <strong>${l.text.slice(0,20)}${l.text.length>20?'...':''}</strong> 🔊
    </div>
  `).join('');
}

// ── ROAD TO FLUENCY ──
function updateRoad() {
  const n = learned.length;
  const maxThreshold = MILESTONES[MILESTONES.length-1].threshold;
  const pct = Math.min(100, (n / maxThreshold) * 100);

  document.getElementById('roadFill').style.width = pct + '%';
  document.getElementById('traveller').style.left = pct + '%';

  // Find current milestone
  let current = 0;
  for (let i=0; i<MILESTONES.length; i++) {
    if (n >= MILESTONES[i].threshold) current = i;
  }

  document.getElementById('traveller').textContent = MILESTONES[current].emoji;
  document.getElementById('roadLabel').textContent = MILESTONES[current].label;

  // Update milestone dots
  MILESTONES.forEach((m, i) => {
    const dot = document.getElementById('m'+i);
    const lbl = document.getElementById('ml'+i);
    if (!dot) return;
    dot.className = 'm-dot';
    lbl.className = 'm-label';
    if (n >= m.threshold && i < current) { dot.classList.add('reached'); lbl.classList.add('reached'); }
    else if (i === current) { dot.classList.add('current'); lbl.classList.add('current'); }
  });
}

// ── STATUS ──
function setStatus(text, mode='') {
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusText');
  pill.className = 'status-pill' + (mode?' '+mode:'');
  txt.textContent = text;
  const dot = pill.querySelector('.spill-dot');
  dot.className = 'spill-dot' + (mode==='active'?' pulse':'');
}

// ── APP STATE ──
function setSt(s) {
  st = s;
  const btn   = document.getElementById('convBtn');
  const icon  = document.getElementById('convIcon');
  const lbl   = document.getElementById('convLabel');
  const waves = document.getElementById('wavebars');

  btn.className = 'conv-btn ' + (s==='listening'?'listening':s==='speaking'?'speaking':s==='thinking'?'thinking':'idle');
  waves.className = 'wavebars' + (s==='listening'?' show':'');
  icon.style.display = s==='listening' ? 'none' : 'block';

  const icons = { idle:'🎙️', listening:'', thinking:'💭', speaking:'🔊' };
  const labels = { idle:'Start Talking', listening:'Listening — tap to stop', thinking:'Thinking...', speaking:'Speaking — tap to interrupt' };
  icon.textContent = icons[s]||'🎙️';
  lbl.textContent = labels[s]||'Start Talking';

  const statuses = {
    idle:      ['Ready', ''],
    listening: ['Listening...', 'active'],
    thinking:  ['Thinking in Bemba...', 'thinking'],
    speaking:  ['AI is speaking', 'speaking'],
  };
  const [stxt, smode] = statuses[s]||['Ready',''];
  setStatus(stxt, smode);
}

// ── BOOT ──
function boot() {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  updateRoad();
  renderLearnedChips();

  const n = learned.length;
  const opener = n > 0
    ? `Mwaiseni! Natotela — you have taught me ${n} thing${n===1?'':'s'} already! Let me try: ${learned[0]?.text}. Nati bwino? Did I say that right? Say it back to me the way someone from Garneton would really say it!`
    : `Mwaiseni! I am AI Marvelous — I want to learn Bemba from you! I think "mwaiseni" means hello — nati bwino? Did I say that right? Can you say it back to me exactly how a Zambian person would say it?`;

  setTimeout(() => {
    addBubble('ai', opener, 'q');
    say(opener);
  }, 600);
}

boot();
</script>
